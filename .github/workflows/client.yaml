name: Client

on:
  push:
    branches:
      - "main"
    paths:
      - client/**/*
      - .github/workflows/client.yaml
  pull_request:
    paths:
      - client/**/*
      - .github/workflows/client.yaml

jobs:
  package:
    name: Check npm install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./client/.node-version
          cache: pnpm
          cache-dependency-path: ./client/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
        working-directory: ./client/
  format:
    name: Run format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./client/.node-version
          cache: pnpm
          cache-dependency-path: ./client/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
        working-directory: ./client/
      - name: Run fmt
        run: npm run fmt:check
        working-directory: ./client/
  lint:
    name: Run lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./client/.node-version
          cache: pnpm
          cache-dependency-path: ./client/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
        working-directory: ./client/
      - name: Run lint
        run: pnpm run lint
        working-directory: ./client/
  build:
    name: Run build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./client/.node-version
          cache: pnpm
          cache-dependency-path: ./client/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
        working-directory: ./client/
      - name: Run build
        run: pnpm run build
        working-directory: ./client/
